<link rel="stylesheet" href="{{ '/assets/css/ciberaula.css' | relative_url }}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<script>
document.addEventListener("DOMContentLoaded", function() {
  var mc = document.querySelector(".main-content");
  if (mc) {
    var img = document.createElement("img");
    img.src = "{{ '/assets/banner.png' | relative_url }}";
    img.alt = "Ciberaula";
    img.style.cssText = "display:block;max-width:100%;height:auto;margin:0 auto 1.5rem;border-radius:8px";
    mc.insertBefore(img, mc.firstChild);
  }
});
</script>
