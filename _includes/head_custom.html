<link rel="stylesheet" href="{{ '/assets/css/ciberaula.css' | relative_url }}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
/* Banner corporativo */
.ciberaula-banner-fullwidth {
  width: 100%;
  max-width: 100%;
  line-height: 0;
  background: #0d2137;
  overflow: hidden;
}
.ciberaula-banner-fullwidth img {
  width: 100%;
  height: auto;
  display: block;
  max-height: 105px;
  object-fit: cover;
  object-position: left center;
}

/* Ocultar banner duplicado en markdown */
.main-content > p:first-child > img[src*="banner"],
.main-content > img[src*="banner"] {
  display: none !important;
}
.main-content > p:first-child:has(img[src*="banner"]) {
  display: none !important;
}

/* Ocultar site-footer del sidebar */
.side-bar .site-footer {
  display: none !important;
}

/* Footer corporativo — full viewport, ignorando el margin-left del sidebar */
.ciberaula-footer {
  position: relative !important;
  left: 0 !important;
  width: 100vw !important;
  margin-left: 0 !important;
  padding: 2.5rem 4% 0 !important;
  box-sizing: border-box !important;
}

@media (min-width: 50rem) {
  /* En desktop, el footer hereda el margin-left de .main.
     Lo compensamos con position y left negativos */
  .ciberaula-footer {
    margin-left: -15.5rem !important;
    width: 100vw !important;
    padding-left: calc(15.5rem + 4%) !important;
  }
}

@media (min-width: 66.5rem) {
  .ciberaula-footer {
    margin-left: calc(-1 * Max(16.5rem, calc((100% - 66.5rem) / 2 + 16.5rem))) !important;
    width: 100vw !important;
    padding-left: calc(Max(16.5rem, calc((100vw - 66.5rem) / 2 + 16.5rem)) + 4%) !important;
  }
}
</style>
