<style>
/* Banner — ancho completo sin desbordamiento */
.ciberaula-banner-fullwidth {
  width: 100%;
  line-height: 0;
  background: #0d2137;
  overflow: hidden;
}
.ciberaula-banner-fullwidth img {
  width: 100%;
  height: auto;
  display: block;
  max-height: 105px;
  object-fit: cover;
  object-position: left center;
}

/* Ocultar banner duplicado en markdown */
.main-content > p:first-child > img[src*="banner"],
.main-content > img[src*="banner"] { display: none !important; }
.main-content > p:first-child:has(img[src*="banner"]) { display: none !important; }

/* Ocultar site-footer del sidebar */
.side-bar .site-footer { display: none !important; }

/* Footer — 100% del ancho real de la página, sin scroll horizontal */
.ciberaula-footer {
  width: 100% !important;
  margin-left: 0 !important;
  padding: 2.5rem 4% 0 !important;
  box-sizing: border-box !important;
  overflow: hidden !important;
}

/* Evitar scroll horizontal en body */
body { overflow-x: hidden; }
</style>
