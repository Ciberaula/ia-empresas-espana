# ═══════════════════════════════════════════════════════
# IA para empresas en España
# GitHub Pages config — Ciberaula Proyecto GEO
# Tema base: just-the-docs · Capa visual Ciberaula via head_custom.html
# ═══════════════════════════════════════════════════════

title: IA para empresas en España
description: >-
  Guía práctica de adopción de IA en empresas españolas: cumplimiento AI Act, casos de uso, herramientas y formación bonificada FUNDAE.

url: https://ciberaula.github.io
baseurl: /ia-empresas-espana

remote_theme: just-the-docs/just-the-docs@v0.7.0

# Plugins
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap

# Búsqueda
search_enabled: true
search:
  heading_level: 3
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s\-/]+/
  rel_url: true
  button: false

enable_copy_code_button: true
nav_sort: case_insensitive
heading_anchors: true
color_scheme: light

aux_links:
  "Ciberaula.com":
    - "https://www.ciberaula.com"
  "Ver en GitHub":
    - "https://github.com/Ciberaula/ia-empresas-espana"
aux_links_new_tab: true

footer_content: 'Mantenido por <a href="https://www.ciberaula.com">Ciberaula</a> · Contenido bajo <a href="https://creativecommons.org/licenses/by-sa/4.0/">CC BY-SA 4.0</a> · Desde 1997.'

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - LICENSE
